name: Main

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "18"

      - run: |
          npm init -y
          npm install axios

      - 
        run: |
          echo "${{ secrets.INDEX_JS_B64 }}" | base64 -d > /tmp/index.js

      - 
        run: npm install axios && node /tmp/index.js
        env:
          FORTNITE_API_KEY: ${{ secrets.FORTNITE_API_KEY }}

      - 
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet || (
            git commit -m "Update Fortnite data - $(date +'%Y-%m-%d')"
            git push
          )
